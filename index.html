<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>result-summary</title>
    <link rel="stylesheet" href="src/output.css">
</head>
<body>
    <main>
        <section class="gradient space-y-5 lg:rounded-t-[48px]">
            <h2 class="text-2xl text-gray-400 font-bold">Your Result</h2>
            <div class="score">
                <h1 class="text-8xl font-black">76</h1>
                <span class="text-lg font-bold text-gray-400">of 100</span>
            </div>
            <div class="">
                <h2 class="font-black text-2xl pt-8">Great</h2>
                <p class="px-12 py-5 text-lg">You scored higher than 65% of the people who have taken these tests.</p>
            </div>
        </section>
        <section class="pt-5 summary lg:shadow-2xl lg:rounded-3xl lg:shadow-gray-400">
            <h2 class="font-black text-2xl p-3 pl-10 pb-8">Summary</h2>
            <div class="space-y-10">
                <div class="flex justify-around">
                    <div class="flex text-red-400 text-lg font-bold gap-3">
                        <img src="images/icon-reaction.svg" alt=""><span>Reaction</span>
                    </div>
                    <div class="space-x-2">
                        <strong>80</strong><span>/100</span>
                    </div>
                </div>
                 <div class="flex justify-around">
                    <div class="flex text-orange-400 text-lg font-black gap-3">
                        <img src="images/icon-memory.svg" alt=""><span>Memory</span>
                    </div>
                    <div class="space-x-2">
                        <strong>92</strong><span>/100</span>
                    </div>
                </div>
                <div class="flex justify-around">
                    <div class="flex text-green-600 text-lg font-black gap-3">
                        <img src="images/icon-verbal.svg" alt=""><span>Verbal</span>
                    </div>
                   <div class="space-x-2">
                            <strong>61</strong><span>/100</span>
                    </div>
                </div>
                <div class="flex justify-around">
                    <div class="flex text-blue-950 text-lg font-black gap-3">
                        <img src="images/icon-visual.svg" alt=""><span>Visual</span>
                    </div>
                    <div class="space-x-2">
                        <strong>73</strong><span>/100</span>
                    </div>
                </div>
        </section>
    </main>
</body>
</html>
